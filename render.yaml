databases:
  - name: mey-db
    plan: free
    databaseName: meydb
    user: mey

services:
  - type: web
    name: mey
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mey-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: VITE_3C_TOKEN
        value: R02FvFejFgDpLxz4iIJn7s14EveNi9vDJt6c8tptGt6vYJjdcqwXHrzAPuDB
